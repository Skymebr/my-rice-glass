
source = ~/.config/hypr/colors.conf

# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# 1. PROJETOR (Fica no topo)
monitor = HDMI-A-1, 1280x720@60, 320x0, 1

# 2. NOTEBOOK (Fica embaixo, à esquerda)
monitor = eDP-1, 1920x1080@60, 0x720, 1

# 3. HEADLESS-1 (Celular/Sunshine) - À DIREITA do notebook
monitor = HEADLESS-1, 1920x1080@60, 1920x720, 1

# 4. Fallback para outros monitores
monitor = , preferred, auto, 1

misc {
     vrr = 0
     disable_hyprland_logo = true
}
###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
# Comando do Wofi com comportamento toggle
$menu = ~/.config/hypr/scripts/wofi-toggle.sh
$browser = firefox


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# --- 1. PRIORIDADE MÁXIMA (O Daemon inicia sozinho e restaura o cache) ---
# Isso elimina o delay. Ele já começa pintando a tela antes de qualquer script rodar.
exec-once = swww-daemon --format xrgb
exec-once = sleep 2 && hyprctl output create headless HEADLESS-1 2>/dev/null || true
# --- 2. SERVIÇOS BÁSICOS ---
exec-once = ~/.config/hypr/scripts/status_daemon.sh
exec-once = nm-applet &
exec-once = blueman-applet
exec-once = systemctl --user start swaync.service
# exec-once = waybar  <-- COMENTE OU APAGUE ESTA LINHA (O script vai iniciar ela)
exec-once = ~/.config/hypr/scripts/monitor_event.sh

# --- 3. SINCRONIZAÇÃO VISUAL ---
# O script agora só vai gerar as cores e ligar a Waybar.
exec-once = ~/.config/hypr/scripts/wallpaper.sh init

# --- PORTAIS E SERVIÇOS ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal-gtk
env = GTK_THEME,Adwaita-dark
env = GTK_ICON_THEME,Papirus-Dark
exec-once = QT_QPA_PLATFORM=xcb /usr/lib/kdeconnectd & sleep 2 && QT_QPA_PLATFORM=xcb kdeconnect-indicator
exec-once = dbus-update-activation-environment --systemd --all
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# --- OUTROS ---
exec-once = gammastep-indicator

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
 general {

    gaps_in = 4
    gaps_out = 7
    border_size = 3

   #col.active_border = rgba($border_activeff)
   #col.inactive_border = rgba($border_inactiveff)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps

    resize_on_border = true


    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on

    allow_tearing = false
    layout = dwindle

}


# https://wiki.hyprland.org/Configuring/Variables/#decoration

# =======================================================================================
#  DECORATION (Visual)
# =======================================================================================
decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 0.94
    inactive_opacity = 0.86

    shadow {
        enabled = true
        range = 40
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.1696
        ignore_opacity = true
    }
} 
# ^--- IMPORTANTE: Esta chave fecha o decoration! As regras abaixo ficam FORA.


# Workspaces 1-3 → Notebook (eDP-1) - APENAS ESTE É DEFAULT
workspace = 1, monitor:eDP-1, default:true 
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 10, monitor:eDP-1

# Workspaces 4-6 → Celular (HEADLESS-1) - REMOVIDO default:true
workspace = 4, monitor:HEADLESS-1
workspace = 5, monitor:HEADLESS-1
workspace = 6, monitor:HEADLESS-1

# Workspaces 7-9 → Projetor (HDMI-A-1) - REMOVIDO default:true
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1

# =======================================================================================
#  LAYER RULES (Regras de Transparência)
# =======================================================================================

# SwayNC (Notificações)
# Nova sintaxe: blur precisa de "on" e usa match:namespace
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
# ignorealpha → ignore_alpha (com underscore)
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# Wofi (Menu)
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.5, match:namespace wofi
layerrule = animation slide, match:namespace wofi

# Skywall (Wallpaper Picker)
layerrule = blur on, match:namespace skywall
layerrule = ignore_alpha 0.0, match:namespace skywall
layerrule = no_anim on, match:namespace skywall

# =======================================================================================
#  ANIMATIONS (Padrão Original)
# =======================================================================================
animations {
    enabled = true
    
    # Curvas de Animação (Beziers)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    # mudei aqui
  
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    
    # 2. Defina uma curva "Suave" (Decel)
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    # Configuração das Animações
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    
    # Workspaces (Slide Padrão)
    animation = workspaces, 1, 3, easeOutQuint, slide
    animation = workspacesIn, 1, 3, easeOutQuint, slide
    animation = workspacesOut, 1, 3, easeOutQuint, slide
} # <--- FECHA ANIMATIONS



# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true  # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2
    kb_options = 
    kb_rules =
    numlock_by_default = true 

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
   # workspace_swipe = true

}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 
# Define o local de salvamento do Hyprshot
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, B, exec, $browser 
bind = $mainMod, E, exec, thunar
bind = $mainMod, F, fullscreen
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = , Print, exec, hyprshot -m region --clipboard-only  # Captura uma região e copia para a área de transferência
bind = $mainMod, Print, exec, hyprshot -m window           # Captura a janela ativa
bind = SHIFT, Print, exec, hyprshot -m output              # Captura a tela inteira
bind = SUPER, W, exec, ~/.config/hypr/scripts/wallpaper.sh
bind = SUPER, Z, exec, ~/.config/hypr/scripts/skywall.sh

# =======================================================
#  Menu de Performance
#  Atalho para entrar: SUPER + O
# =======================================================

bind = SUPER, O, exec, bash -c "notify-send -u normal -t 4000 '⚡ Menu de Performance' '(<b>E</b>)conomia\n(<b>B</b>)alanceado\n(<b>P</b>)erformance\n(<b>T</b>) status' ; hyprctl dispatch submap perf"

submap = perf

bind = , E, exec, bash -c "$HOME/.local/bin/perf-switch.sh economia && hyprctl dispatch submap reset"
bind = , B, exec, bash -c "$HOME/.local/bin/perf-switch.sh balanceado && hyprctl dispatch submap reset"
bind = , P, exec, bash -c "$HOME/.local/bin/perf-switch.sh performance && hyprctl dispatch submap reset"
bind = , T, exec, bash -c "$HOME/.local/bin/perf-switch.sh status && hyprctl dispatch submap reset"
bind = , escape, exec, ~/.config/hypr/scripts/cancel_perf.sh && hyprctl dispatch submap reset

submap = reset

# =======================================================
#  Submap Completo e Corrigido (v3)
#  Atalho para entrar: SUPER + X
# =======================================================

# Ativa o menu com uma notificação listando as opções
bind = SUPER, X, exec, bash -c "notify-send -u normal -t 4000 ' Menu de Energia' '(<b>P</b>)oweroff\n(<b>R</b>)einiciar\n(<b>L</b>)ock\n(<b>S</b>)uspender\n(<b>E</b>)ncerrar Sessão' ; hyprctl dispatch submap power"

# Define o conteúdo do submap "power"
submap = power

# Atalho para Desligar (Power off) - (CORRIGIDO: reseta o submap)
bind = , P, exec, bash -c "systemctl poweroff && hyprctl dispatch submap reset"

# Atalho para Reiniciar (Reboot) - (CORRIGIDO: reseta o submap)
bind = , R, exec, bash -c "systemctl reboot && hyprctl dispatch submap reset"

# Atalho para Bloquear a tela (Lock) - (CORRIGIDO: reseta o submap)
bind = , L, exec, bash -c "hyprlock && hyprctl dispatch submap reset"

# Atalho para Suspender (Sleep) - (CORRIGIDO: reseta o submap)
bind = , S, exec, bash -c "systemctl suspend && hyprctl dispatch submap reset"

# Atalho para Encerrar Sessão (Logout) - (ADICIONADO e CORRIGIDO)
bind = , E, exec, bash -c "hyprctl dispatch exit && hyprctl dispatch submap reset"

# Cancela o menu com a tecla Escape e envia uma notificação
bind = , escape, exec, ~/.config/hypr/scripts/cancel_menu.sh && hyprctl dispatch submap reset

# Linha de segurança para garantir que o submap possa ser resetado
submap = reset

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules


# Example windowrule (nova sintaxe)
# windowrule = float on, match:class ^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$ match:title ^$ match:xwayland 1 match:floating 1 match:fullscreen 0 match:pinned 0

render:cm_fs_passthrough = 0
 
ecosystem {
      enforce_permissions = false
  }
