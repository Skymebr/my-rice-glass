k# =================================================================== #
#   TEMA HYPRLOCK "SEMANTIC GLASS"
# =================================================================== #

$base       = 0xff1e1e2e
$text       = 0xffcdd6f4
$subtext0   = 0xffa6adc8
$sapphire   = 0xff74c7ec
$sky        = 0xff89dceb
$mauve      = 0xffcba6f7
$red        = 0xfff38ba8
$yellow     = 0xfff9e2af  # ADICIONADO: Cor de Alerta

# --- ANIMAÇÕES ---
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
}

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = $HOME/.cache/lock_wallpaper.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 4
    blur_size = 6
}

image {
    monitor =
    path = $HOME/Downloads/cutemiku.jpg
    size = 120
    rounding = -1
    border_size = 3
    border_color = $sapphire
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    position = 0, -80
    halign = center
    valign = center
    
    outer_color = $sapphire
    inner_color = $base
    font_color = $text
    
    # --- VOLTANDO AO BÁSICO ---
    placeholder_text = <i>Senha...</i>
    fail_text = <i>Senha Incorreta</i>
    
    fail_color = $red
    capslock_color = $yellow
    check_color = $sky
    
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    fade_on_empty = false
    hide_input = false
    rounding = 20
}

# ... (O resto dos labels continua igual) ...

label {
    monitor =
    # Atualiza a cada 10 min (600000ms) para economizar CPU
    text = cmd[update:600000] ~/.config/hypr/scripts/greeting.sh
    color = $sapphire
    font_size = 12
    font_family = JetBrains Mono Bold
    position = 0, -130
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/music.sh
    color = $subtext0
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, -160 
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text
    font_size = 100
    font_family = JetBrains Mono ExtraBold
    position = 0, 250
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = $sapphire
    font_size = 18
    font_family = JetBrains Mono Bold
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] cat /tmp/lock_status
    color = $text
    font_size = 14
    font_family = JetBrains Mono Nerd Font Bold
    position = -30, -30
    halign = right
    valign = top
}
