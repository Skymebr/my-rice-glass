# configuração do cursor efeito

cursor_trail 3
cursor_trail_start_threshold 2
background_opacity 0.80
background_blur 20
dynamic_background_opacity yes

# Adiciona um respiro nas bordas (essencial para Hyprland)
window_padding_width 15

# Fonte (Já deve estar configurada, mas garante que seja a Nerd Font)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- CARREGAMENTO DE TEMAS ---

# Matugen define toda a paleta do terminal
include colors.conf

# Tab bar elegante e discreta
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_switch_strategy previous
active_tab_font_style bold
inactive_tab_font_style normal

allow_remote_control yes
listen_on unix:@mykitty

# ... resto do seu config ...
