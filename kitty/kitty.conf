# configuração do cursor efeito

cursor_trail 3
cursor_trail_start_threshold 2
background_opacity 0.80
background_blur 20
dynamic_background_opacity yes

# Adiciona um respiro nas bordas (essencial para Hyprland)
window_padding_width 15

# Fonte (Já deve estar configurada, mas garante que seja a Nerd Font)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- CARREGAMENTO DE TEMAS (O Pulo do Gato) ---

# 1. Carrega o Catppuccin (Define TODAS as cores bonitas)
include current-theme.conf

# 2. Carrega o Matugen (Sobrescreve SÓ o fundo e a borda pra combinar com o wallpaper)
include colors.conf

allow_remote_control yes
listen_on unix:@mykitty

# ... resto do seu config ...

