## Configurações Gerais (Pode ajustar conforme seu gosto)
[general]
framerate = 60
autosens = 1
bars = 0
bar_width = 2
bar_spacing = 1

[input]
method = pulse
source = auto

[output]
method = ncurses

## --- A MÁGICA DO MATUGEN AQUI ---
[color]

# Fundo transparente (comente se quiser fundo sólido)
background = default

# Usar gradiente deixa o visual MUITO mais profissional
gradient = 1
gradient_count = 6

# Do topo (agudos) para baixo (graves)
gradient_color_1 = '{{colors.primary.default.hex}}'
gradient_color_2 = '{{colors.secondary.default.hex}}'
gradient_color_3 = '{{colors.tertiary.default.hex}}'
gradient_color_4 = '{{colors.primary_container.default.hex}}'
gradient_color_5 = '{{colors.secondary_container.default.hex}}'
gradient_color_6 = '{{colors.surface_container.default.hex}}'

