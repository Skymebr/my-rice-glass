# --- TINTED COLOR (Cor viva, mas escura) ---
# Pega a cor PRINCIPAL do wallpaper (ex: Rosa) e força a luminosidade para 10% ou 15%
# Isso garante que seja um "Rosa bem escuro" e não um "Cinza avermelhado"
background {{colors.primary.default.hex | set_lightness: 10.0}}

# Garante que o texto seja bem claro para contraste
foreground {{colors.on_surface.default.hex}}

# --- RESTANTE DAS CORES (Mantenha como está) ---
cursor {{colors.primary.default.hex}}
color0 {{colors.surface.default.hex}}
# ...etc
